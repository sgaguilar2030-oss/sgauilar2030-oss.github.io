<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Advanced GWA Calculator</title>

<style>
body {
    font-family: Arial;
    background: #f4f7fb;
    padding: 20px;
}
.container {
    max-width: 900px;
    margin: auto;
    background: white;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}
h1 {
    text-align: center;
}
.subject {
    border: 1px solid #ddd;
    padding: 15px;
    margin-top: 10px;
    border-radius: 8px;
}
input {
    width: 100%;
    padding: 8px;
    margin: 5px 0;
}
button {
    padding: 10px;
    margin-top: 10px;
    width: 100%;
    border: none;
    border-radius: 6px;
    background: #4CAF50;
    color: white;
    font-weight: bold;
    cursor: pointer;
}
button:hover {
    background: #45a049;
}
.result {
    margin-top: 15px;
    padding: 10px;
    background: #eef;
    border-radius: 6px;
}
</style>
</head>

<body>

<div class="container">
<h1>Advanced GWA Calculator</h1>

<label>Name</label>
<input id="name">

<label>ID</label>
<input id="id">

<label>Quarter (Q1, Q2...)</label>
<input id="quarter">

<div id="subjects"></div>

<button onclick="addSubject()">+ Add Subject</button>
<button onclick="calculateAll()">Calculate Overall GWA</button>

<div class="result" id="output"></div>
</div>

<script>
let subjects = [];

function addSubject() {
    let index = subjects.length;

    let div = document.createElement("div");
    div.className = "subject";

    div.innerHTML = `
        <h3>Subject ${index + 1}</h3>
        <input placeholder="Subject Name" id="name_${index}">

        <label>Formative Avg</label>
        <input type="number" id="fa_${index}">
        <label>Weight</label>
        <input type="number" id="fa_w_${index}">

        <label>Alternative Avg</label>
        <input type="number" id="aa_${index}">
        <label>Weight</label>
        <input type="number" id="aa_w_${index}">

        <label>Long Test Avg</label>
        <input type="number" id="lt_${index}">
        <label>Weight</label>
        <input type="number" id="lt_w_${index}">

        <label>Final Exam</label>
        <input type="number" id="final_${index}">
        <label>Weight</label>
        <input type="number" id="final_w_${index}">
    `;

    document.getElementById("subjects").appendChild(div);
    subjects.push(index);
}

function calcSubject(i) {
    let fa = Number(document.getElementById(`fa_${i}`).value) || 0;
    let fa_w = Number(document.getElementById(`fa_w_${i}`).value) || 0;

    let aa = Number(document.getElementById(`aa_${i}`).value) || 0;
    let aa_w = Number(document.getElementById(`aa_w_${i}`).value) || 0;

    let lt = Number(document.getElementById(`lt_${i}`).value) || 0;
    let lt_w = Number(document.getElementById(`lt_w_${i}`).value) || 0;

    let final = Number(document.getElementById(`final_${i}`).value) || 0;
    let final_w = Number(document.getElementById(`final_w_${i}`).value) || 0;

    let gwa =
        (fa * (fa_w / 100)) +
        (aa * (aa_w / 100)) +
        (lt * (lt_w / 100)) +
        (final * (final_w / 100));

    return gwa;
}

function convertGWA(gwa) {
    if (gwa >= 96) return "1.00";
    if (gwa >= 90) return "1.25";
    if (gwa >= 84) return "1.50";
    if (gwa >= 78) return "1.75";
    if (gwa >= 72) return "2.00";
    if (gwa >= 66) return "2.25";
    if (gwa >= 60) return "2.50";
    if (gwa >= 55) return "2.75";
    return "3.00 or below";
}

function calculateAll() {
    if (subjects.length === 0) {
        alert("Add at least one subject.");
        return;
    }

    let total = 0;
    let subjectData = [];

    subjects.forEach(i => {
        let gwa = calcSubject(i);
        total += gwa;

        let name = document.getElementById(`name_${i}`).value || "Subject";

        subjectData.push({name, gwa});
    });

    let overall = total / subjects.length;

    let result = `
        <b>Overall GWA:</b> ${overall.toFixed(2)}%<br>
        <b>Equivalent:</b> ${convertGWA(overall)}<br><br>
        <b>Subjects:</b><br>
    `;

    subjectData.forEach(s => {
        result += `${s.name}: ${s.gwa.toFixed(2)}%<br>`;
    });

    document.getElementById("output").innerHTML = result;

    saveData(overall, subjectData);
}

function saveData(overall, subjects) {
    let name = document.getElementById("name").value;
    let id = document.getElementById("id").value;
    let quarter = document.getElementById("quarter").value;

    let data = JSON.parse(localStorage.getItem("gwa_data")) || {};

    if (!data[id]) {
        data[id] = { name: name, quarters: {} };
    }

    data[id].quarters[quarter] = {
        overall: overall,
        subjects: subjects
    };

    localStorage.setItem("gwa_data", JSON.stringify(data));
}
</script>

</body>
</html>
